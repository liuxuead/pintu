<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>智能拼图游戏</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- 主界面 -->
    <div class="start-screen" id="startScreen">
        <h1 class="game-title">智能拼图游戏</h1>
        <div class="start-content">
            <!-- 左侧：图片选择 -->
            <div class="left-panel">
                <h2 class="panel-title">选择图片</h2>
                <div class="image-list">
                    <div class="image-item selected" data-image="assets/fd.png" onclick="selectImage(this)">
                        <img src="assets/fd.png" alt="fd">
                        <div class="image-label">fd</div>
                    </div>
                    <div class="image-item" data-image="assets/mq.png" onclick="selectImage(this)">
                        <img src="assets/mq.png" alt="mq">
                        <div class="image-label">mq</div>
                    </div>
                    <div class="image-item" data-image="assets/sgj.png" onclick="selectImage(this)">
                        <img src="assets/sgj.png" alt="sgj">
                        <div class="image-label">sgj</div>
                    </div>
                    <div class="image-item" data-image="assets/tcq.png" onclick="selectImage(this)">
                        <img src="assets/tcq.png" alt="tcq">
                        <div class="image-label">tcq</div>
                    </div>
                    <div class="image-item" data-image="assets/test.png" onclick="selectImage(this)">
                        <img src="assets/test.png" alt="test">
                        <div class="image-label">test</div>
                    </div>
                </div>
            </div>
            
            <!-- 右侧：设置区域 -->
            <div class="right-panel">
                <h2 class="panel-title">参数设置</h2>
                <div class="settings-area">
                    <div class="setting-item">
                        <label>添加图片:</label>
                        <input type="file" id="imageUpload" accept="image/*" style="display: none;" onchange="handleImageUpload(this)">
                        <button class="add-image-button" onclick="document.getElementById('imageUpload').click()">+</button>
                    </div>
                    <div class="setting-item">
                        <label>横向块数:</label>
                        <input type="number" id="widthInput" value="6" min="2" max="20">
                    </div>
                    <div class="setting-item">
                        <label>纵向块数:</label>
                        <input type="number" id="heightInput" value="10" min="2" max="20">
                    </div>
                    <div class="setting-item checkbox-item">
                        <label>
                            <input type="checkbox" id="timerCheckbox" onchange="toggleTimerInput()">
                            是否计时
                        </label>
                    </div>
                    <div class="setting-item" id="timerTimeContainer" style="display: none;">
                        <label>计时时间 (分钟):</label>
                        <input type="number" id="timerTimeInput" value="10" min="1" max="120">
                    </div>
                </div>
                <div style="display: flex; gap: 15px; justify-content: center;">
                    <button class="start-button" onclick="startGame()">开始<br>游戏</button>
                    <button class="multiplayer-button" onclick="showMultiplayerModal()">双人<br>模式</button>
                </div>
            </div>
        </div>
    </div>

    <!-- 双人模式弹窗 -->
    <div id="multiplayerModal" class="modal" style="display: none;">
        <div class="modal-content multiplayer-content">
            <h2 style="color: #667eea; margin-bottom: 20px;">🎮 双人模式</h2>
            
            <div id="multiplayerStep1">
                <p style="margin-bottom: 20px;">选择游戏模式</p>
                <div style="display: flex; gap: 15px; margin-bottom: 20px;">
                    <button class="modal-button" style="background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);" onclick="selectMode('coop')">合作模式</button>
                    <button class="modal-button" style="background: linear-gradient(135deg, #e74c3c 0%, #c0392b 100%);" onclick="selectMode('versus')">对战模式</button>
                </div>
                <button class="modal-button" style="background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);" onclick="closeMultiplayerModal()">取消</button>
            </div>
            
            <div id="multiplayerStep1_2" style="display: none;">
                <p style="margin-bottom: 20px;">选择你的角色</p>
                <div style="display: flex; gap: 15px; margin-bottom: 20px;">
                    <button class="modal-button" style="background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);" onclick="createRoom()">创建房间</button>
                    <button class="modal-button" style="background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);" onclick="joinRoom()">加入房间</button>
                </div>
                <button class="modal-button" style="background: linear-gradient(135deg, #e74c3c 0%, #c0392b 100%);" onclick="backToModeSelect()">返回</button>
            </div>
            
            <div id="multiplayerStep2" style="display: none;">
                <p style="margin-bottom: 10px; font-size: 16px;">这是你的房间码：</p>
                <p style="margin-bottom: 10px; font-size: 12px; color: #888;">（不用看懂，直接复制发给对方）</p>
                <div style="background: #f5f5f5; padding: 15px; border-radius: 10px; margin-bottom: 15px; word-break: break-all; font-family: monospace; font-size: 10px; max-height: 120px; overflow-y: auto; line-height: 1.5;" id="roomCodeDisplay"></div>
                <button class="modal-button" style="background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); margin-bottom: 15px;" onclick="copyRoomCode()">复制房间码</button>
                <p id="connectionStatus" style="margin-bottom: 15px;">等待对方连接...</p>
                <div style="margin-bottom: 15px;">
                    <p style="margin-bottom: 5px;">对方的房间码：</p>
                    <textarea id="peerCodeInput" style="width: 100%; height: 100px; padding: 10px; border: 2px solid #ddd; border-radius: 10px; font-family: monospace; font-size: 10px; resize: none; line-height: 1.5;"></textarea>
                </div>
                <button class="modal-button" style="background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%); margin-bottom: 15px;" onclick="submitPeerCode()">连接对方</button>
                <button class="modal-button" style="background: linear-gradient(135deg, #e74c3c 0%, #c0392b 100%);" onclick="cancelConnection()">取消</button>
            </div>
            
            <div id="multiplayerStep3" style="display: none;">
                <p style="margin-bottom: 10px;">输入对方的房间码：</p>
                <p style="margin-bottom: 10px; font-size: 12px; color: #888;">（粘贴对方发给你的房间码）</p>
                <textarea id="joinCodeInput" style="width: 100%; height: 100px; padding: 10px; border: 2px solid #ddd; border-radius: 10px; font-family: monospace; font-size: 10px; resize: none; margin-bottom: 15px; line-height: 1.5;"></textarea>
                <button class="modal-button" style="background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%); margin-bottom: 15px;" onclick="submitJoinCode()">加入房间</button>
                <button class="modal-button" style="background: linear-gradient(135deg, #e74c3c 0%, #c0392b 100%);" onclick="closeMultiplayerModal()">取消</button>
            </div>
        </div>
    </div>

    <!-- 游戏界面 -->
    <div class="game-screen" id="gameScreen" style="display: none;">
        <!-- 零件区 -->
        <div class="parts-container" id="partsContainer"></div>

        <!-- 预览图区域 -->
        <div class="preview-area">
            <div id="gameTimer" class="game-timer">00:00:00</div>
            <img id="previewImg" class="preview-img" onclick="showFullImage()" src="" alt="主图预览">
            <button id="hintButton" class="hint-button" onclick="handleHintClick()">
                <div class="hint-count" id="hintCount">3</div>
                <div class="hint-timer" id="hintTimer"></div>
            </button>
            <button id="returnHint" class="back-to-start" ondblclick="handleDoubleClickReturn()" style="background: linear-gradient(135deg, #3498db, #2980b9); display: none;">返回</button>
            <button id="backToStart" class="back-to-start" onclick="backToStartScreen()">返回</button>
            <button id="viewOpponentButton" class="back-to-start" onclick="viewOpponentProgress()" style="background: linear-gradient(135deg, #f39c12, #e67e22); display: none;">查看对方</button>
        </div>

        <!-- 主拼图区 -->
        <div class="main-board" id="mainBoardArea">
            <div class="puzzle-container" id="mainBoard"></div>
        </div>
        
        <!-- 间隔区域 -->
        <div class="gap-area" id="gapArea"></div>
        
        <!-- 子拼图区 -->
        <div class="sub-board" id="subBoardArea">
            <div class="puzzle-container" id="subBoard"></div>
        </div>
    </div>
    
    <!-- 全屏图片预览 -->
    <div id="fullImageModal" class="full-image-modal">
        <img id="fullImage" class="full-image" src="" alt="全屏主图">
    </div>

    <script src="js/puzzle-core.js"></script>
</body>
</html>
