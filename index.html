<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>智能拼图游戏</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- 主进入界面 -->
    <div id="mainEntry" class="main-entry">
        <h1>智能拼图游戏</h1>
        
        <!-- 小图标展示区 -->
        <div class="icon-gallery">
            <h2>选择拼图</h2>
            <div class="icon-container" id="iconContainer">
                <!-- 动态生成图标 -->
            </div>
        </div>
        
        <!-- 右侧参数设置区 -->
        <div class="param-setting" id="paramSetting">
            <h2>参数设置</h2>
            
            <!-- 图片预览区 -->
            <div class="image-preview" id="imagePreview">
                <img id="selectedImage" src="" alt="预览图片">
            </div>
            
            <!-- 数据录入区 -->
            <div class="data-input">
                <div class="input-group">
                    <label>横向块数:</label>
                    <input type="number" id="widthInput" min="2" max="20" value="3">
                </div>
                <div class="input-group">
                    <label>纵向块数:</label>
                    <input type="number" id="heightInput" min="2" max="20" value="3">
                </div>
                <div class="input-group">
                    <label>是否计时:</label>
                    <input type="checkbox" id="timerCheckbox">
                </div>
                <div class="input-group" id="timeSetting">
                    <label>计时时间 (秒):</label>
                    <input type="number" id="timeInput" min="1" max="300" value="60">
                </div>
                <div class="input-group">
                    <label>支持横屏:</label>
                    <input type="checkbox" id="landscapeCheckbox">
                </div>
            </div>
            
            <!-- 确认按钮 -->
            <button class="confirm-btn" id="confirm-btn" onclick="startGame()" disabled>开始游戏</button>
        </div>
        
        <!-- 上传功能 -->
        <div class="upload-section">
            <h2>上传自定义图片</h2>
            <input type="file" id="imageUpload" accept="image/*">
            <button class="upload-btn" id="upload-btn" onclick="uploadImage()">上传</button>
        </div>
        
        <!-- 简单拼图按钮 -->
        <div class="simple-puzzle-section">
            <button class="simple-puzzle-btn" onclick="startSimplePuzzle()">简单拼图模式</button>
        </div>
    </div>

    <!-- 游戏界面 -->
    <div id="gameInterface" class="game-interface" style="display: none;">
        <!-- 零件区（托盘） -->
        <div class="parts-container" id="partsContainer"></div>

        <!-- 中间控件区 -->
        <div class="control-area">
            <div class="timer-display" id="timerDisplay"></div>
            <img id="previewImg" class="preview-img" onclick="showFullImage()" src="" alt="主图预览">
            <div class="countdown-btn" id="countdown-btn">3</div>
            <div class="back-home" ondblclick="backToHome()">双击此处退回</div>
        </div>

        <!-- 主拼图区 -->
        <div class="main-board">
            <div class="puzzle-container" id="mainBoard"></div>
        </div>
        
        <!-- 全屏图片预览 -->
        <div id="fullImageModal" class="full-image-modal">
            <img id="fullImage" class="full-image" src="" alt="全屏主图">
        </div>
    </div>

    <script src="js/puzzle-core.js"></script>
</body>
</html>
