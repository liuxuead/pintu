<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>智能拼图游戏</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- 零件区 -->
    <div class="parts-container" id="partsContainer"></div>

    <!-- 主拼图区 -->
    <div class="main-board">
        <div class="puzzle-container" id="mainBoard"></div>
    </div>



    <!-- 拼图选择按钮 -->
    <div class="puzzle-selector">
        <img id="previewImg" class="preview-img" onclick="showFullImage()" src="" alt="主图预览">
        <button class="select-btn" onclick="showPuzzleSelector()">选择拼图</button>
        <div class="selector-menu" id="selectorMenu">
            <div class="menu-header">
                <h3>选择拼图</h3>
                <button class="close-btn" onclick="hidePuzzleSelector()">×</button>
            </div>
            <div class="menu-content" id="puzzleList"></div>
        </div>
    </div>
    
    <!-- 全屏图片预览 -->
    <div id="fullImageModal" class="full-image-modal" onclick="hideFullImage()">
        <img id="fullImage" class="full-image" src="" alt="全屏主图">
    </div>

    <script src="js/puzzle-core.js"></script>
</body>
</html>
